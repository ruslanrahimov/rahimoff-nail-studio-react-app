<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rahimoff Nail Studio</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path into a query string so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1).join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .replace(/&/g, "~and~") +
          (l.search
            ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
